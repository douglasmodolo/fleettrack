version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fleettrack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleettrack_orders
    ports:
      - "5433:5432"
    volumes:
      # persiste os dados mesmo se o container reiniciar
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: